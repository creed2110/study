<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quiz</title>
    <link rel="stylesheet" href="assets/Frame-works/bootstrap-5.0.2/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="assets/Frame-works/boxicons-2.1.4/css/boxicons.min.css">
    <style>
         body{
        padding-bottom: 20px;
      }
      .card{
        border-radius: 15px;
        box-shadow: 0 4px 8px rgb(0,0,0,0.1);
      }
      nav.nav{
        font-size: 13px;
      }
      nav.nav i{
        font-size:18px;
        
      }
      .next{
          border-radius: 50%;
          width:80px;
          height:80px;

      }
         .quiz-box {
      max-width: 700px;
      margin: auto;
    }
    .options label {
      display: block;
      padding: 8px;
      background: #fff;
      border: 1px solid #ddd;
      margin-bottom: 8px;
      border-radius: 6px;
      cursor: pointer;
    }
    .options label:hover {
      background: #f1f1f1;
    }
    </style>
</head>
<body>
    <div class="container py-4 quiz-box">

  <!-- HEADER -->
  <div class="text-center mb-4">
    <h2>Quiz App</h2>
    <div id="timer" class="fw-bold text-danger fs-5">10:00</div>
  </div>

  <!-- SUBJECT SELECT -->
  <div class="card p-3 mb-3">
    <label class="form-label">Select Subject</label>

    <select id="subjectSelect" class="form-select mb-3">
      <option value="">-- Choose Subject --</option>
      <option value="english">English</option>
      <option value="math">Math</option>
      <option value="physics">Physics</option>
      <option value="chemistry">Chemistry</option>
      <option value="biology">Biology</option>
    </select>

    <button id="startBtn" class="btn btn-primary w-100">
      Start Quiz
    </button>
  </div>

  <!-- PROGRESS BAR -->
  <div class="progress mb-3">
    <div id="progressBar" class="progress-bar" style="width: 0%"></div>
  </div>

  <!-- QUIZ CONTAINER -->
  <div id="quizContainer" class="card p-4 mb-3">
    <p class="text-muted text-center">
      Select a subject and start the quiz
    </p>
  </div>

  <!-- NAV BUTTONS -->
  <div class="d-flex justify-content-between mb-3">
    <button id="prevBtn" class="btn btn-secondary">
      Previous
    </button>

    <button id="nextBtn" class="btn btn-primary">
      Next
    </button>
  </div>

  <!-- SUBMIT -->
  <button id="submitBtn" class="btn btn-success w-100 mb-3">
    Submit Quiz
  </button>

  <!-- RESULT -->
  <div id="result" class="text-center fw-bold fs-4 mb-3"></div>

  <!-- RECENT SCORES -->
  <div id="recentScores" class="card p-3">
    <h5>Recent Scores</h5>
    <p class="text-muted">No scores yet</p>
  </div>

</div>

    <nav class=" nav nav-pills nav-justified fixed-bottom bg-white border-top shadow-sm">

        <a href="index.html" class="nav-link active"> <i class="bx bxs-home-circle"></i><br>Home </a>
        <a href="Tasks.html" class="nav-link "><i class="bx bx-list-check"></i><br>Tasks </a>
        <a href="Premium.html" class="nav-link "> <i class="bx bxs-star"></i><br>Premium</a>
        <a href="Profile.html" class="nav-link "><i class="bx bxs-user"></i><br>Profile </a>
      </nav>
     <script src="assets/js/quiz.js"></script>
</body>
</html>
